<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Detector</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #cce7ff, #e6f2ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #2b6cb0;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #90cdf4;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: #4299e1;
            box-shadow: 0 0 5px rgba(66,153,225,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4299e1;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #3182ce;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
        }

        /* Spam (Red) */
        .spam {
            background: #ffe5e5;
            color: #c53030;
        }

        /* Not Spam (Green) */
        .ham {
            background: #e6fffa;
            color: #2f855a;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📧 Spam Detector</h2>

    <form action="/predict" method="post">
        <input type="text" name="message" placeholder="Enter your message..." required>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <div class="result {{ status }}">
            {{ result }}
        </div>
    {% endif %}
</div>

</body>
</html>
